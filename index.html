<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cockpit Prospection — Conciergerie</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap');

:root {
  --bg: #0e0f13;
  --surface: #16181f;
  --surface2: #1e2029;
  --border: #2a2d38;
  --gold: #d4a853;
  --gold-dim: #3d2f10;
  --green: #3ecf8e;
  --green-dim: #0d2e20;
  --red: #f06060;
  --red-dim: #2e0f0f;
  --blue: #5b9cf6;
  --blue-dim: #16263f;
  --purple: #b88af0;
  --purple-dim: #271f3d;
  --text: #e8e6e0;
  --muted: #6b6f7e;
  --muted2: #3a3d4a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 16px;
  font-size: 13px;
}

/* MODE SWITCH */
.mode-switch-wrap {
  max-width: 1100px;
  margin: 0 auto 12px;
}
.mode-switch {
  display: flex;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 5px;
  gap: 5px;
}
.mode-btn {
  flex: 1;
  padding: 14px 16px;
  border-radius: 8px;
  border: none;
  background: transparent;
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
}
.mode-btn .mode-icon { font-size: 18px; margin-bottom: 4px; display: block; }
.mode-btn .mode-title {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 2px;
}
.mode-btn .mode-sub { font-size: 10.5px; color: var(--muted); line-height: 1.3; }
.mode-btn.active.m1 { background: var(--blue-dim); border: 1px solid var(--blue); }
.mode-btn.active.m1 .mode-title { color: var(--blue); }
.mode-btn.active.m2 { background: var(--purple-dim); border: 1px solid var(--purple); }
.mode-btn.active.m2 .mode-title { color: var(--purple); }
.mode-btn:not(.active) { opacity: 0.55; }
.mode-btn:not(.active):hover { opacity: 0.85; }

/* LAYOUT GRID */
.cockpit {
  display: grid;
  grid-template-columns: 220px 1fr 200px;
  grid-template-rows: auto auto;
  gap: 10px;
  max-width: 1100px;
  margin: 0 auto;
}

/* TOPBAR */
.topbar {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 4px 10px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 8px;
}
.topbar-title {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.04em;
}
.topbar-meta {
  font-size: 11px;
  color: var(--muted);
  display: flex;
  gap: 16px;
  align-items: center;
}
.live-dot {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 600;
  color: var(--green);
}
.live-dot::before {
  content: '';
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 1.8s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.8); }
}
.timer-display {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--green);
  letter-spacing: 0.1em;
  cursor: pointer;
}
.bottom-goal {
  font-family: 'Syne', sans-serif;
  font-size: 11.5px;
  font-weight: 700;
  letter-spacing: 0.03em;
}

/* PANEL BASE */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.panel-label {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

/* PHASES COL */
.phase-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid transparent;
}
.phase-item:hover { background: var(--surface2); }
.phase-item.active { border-color: var(--accent-color); background: var(--accent-dim); }
.phase-item.done .phase-num { background: var(--green); color: #000; }
.phase-item.done .phase-title { color: var(--muted); text-decoration: line-through; }

.phase-num {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--muted2);
  color: var(--muted);
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
}
.phase-item.active .phase-num { background: var(--accent-color); color: #000; }
.phase-title { font-size: 12.5px; font-weight: 600; color: var(--text); line-height: 1.3; }
.phase-sub { font-size: 10.5px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
.phase-connector { width: 1px; height: 8px; background: var(--border); margin-left: 21px; }

/* MAIN COL */
.main-col { display: flex; flex-direction: column; gap: 10px; }

.script-display {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 18px;
}
.script-phase-title {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 800;
  color: var(--accent-color);
  margin-bottom: 4px;
}
.script-phase-goal {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.speech-bubble {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent-color);
  border-radius: 0 8px 8px 0;
  padding: 12px 14px;
  margin-bottom: 10px;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
  font-style: italic;
}
.speech-tip {
  font-size: 11px;
  color: var(--accent-color);
  font-style: normal;
  margin-top: 6px;
  display: flex;
  align-items: flex-start;
  gap: 5px;
}
.speech-tip::before { content: '→'; flex-shrink: 0; }

.nav-buttons { display: flex; gap: 8px; margin-top: 4px; }
.btn {
  padding: 9px 18px;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  letter-spacing: 0.03em;
}
.btn-prev { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
.btn-prev:hover { color: var(--text); border-color: var(--muted); }
.btn-next { background: var(--accent-color); color: #000; font-weight: 700; flex: 1; }

.quick-qs { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
.quick-qs .panel-label { border: none; padding-bottom: 6px; }
.q-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.q-chip {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 10px;
  font-size: 11.5px;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  line-height: 1.35;
}
.q-chip:hover { border-color: var(--accent-color); color: var(--text); }
.q-chip.used { border-color: var(--green-dim); color: var(--muted); background: var(--green-dim); }

/* RIGHT COL */
.right-col { display: flex; flex-direction: column; gap: 10px; }

.info-list { display: flex; flex-direction: column; gap: 5px; }
.info-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 8px; border-radius: 6px; cursor: pointer;
  transition: background 0.15s; border: 1px solid transparent;
}
.info-item:hover { background: var(--surface2); }
.info-item.checked { opacity: 0.5; }
.info-item.checked .info-box { background: var(--green); border-color: var(--green); }
.info-item.checked .info-box::after { content: '✓'; color: #000; font-size: 9px; font-weight: 700; }
.info-box { width: 14px; height: 14px; border: 1.5px solid var(--border); border-radius: 3px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.info-text { font-size: 11.5px; color: var(--text); line-height: 1.3; }

.obj-list { display: flex; flex-direction: column; gap: 5px; }
.obj-item {
  padding: 8px 10px; border-radius: 6px; cursor: pointer;
  border: 1px solid var(--border); background: var(--surface2);
  font-size: 11.5px; color: var(--muted); transition: all 0.15s;
}
.obj-item:hover { border-color: var(--red); color: var(--text); }
.obj-item.open { border-color: var(--red); background: var(--red-dim); color: var(--text); }
.obj-response {
  display: none; font-size: 11px; color: var(--text); margin-top: 7px;
  line-height: 1.6; border-top: 1px solid var(--border); padding-top: 7px; font-style: italic;
}
.obj-item.open .obj-response { display: block; }

/* BOTTOMBAR */
.bottombar { grid-column: 1 / -1; display: flex; align-items: center; gap: 16px; padding: 10px 4px 0; border-top: 1px solid var(--border); }
.progress-track { flex: 1; height: 4px; background: var(--muted2); border-radius: 2px; }
.progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }
.bottom-label { font-size: 11px; color: var(--muted); }

/* MOBILE */
@media (max-width: 750px) {
  body { padding: 10px; }
  .cockpit { grid-template-columns: 1fr; }
  .mode-switch { flex-direction: column; }
  .q-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="mode-switch-wrap">
  <div class="mode-switch">
    <button class="mode-btn m1 active" id="btnMode1" onclick="setMode(1)">
      <span class="mode-icon">🔧</span>
      <span class="mode-title">Proprio autonome (LCD)</span>
      <span class="mode-sub">Gère déjà son Airbnb seul — il faut le décharger</span>
    </button>
    <button class="mode-btn m2" id="btnMode2" onclick="setMode(2)">
      <span class="mode-icon">🔄</span>
      <span class="mode-title">Proprio LLD → LCD</span>
      <span class="mode-sub">Loue à l'année — il faut ouvrir le sujet LCD</span>
    </button>
  </div>
</div>

<div class="cockpit">

  <div class="topbar">
    <div class="topbar-title" id="topTitle">🔧 Prospection — Proprio LCD autonome</div>
    <div class="topbar-meta">
      <span class="live-dot">EN APPEL</span>
      <span class="timer-display" id="timer" onclick="toggleTimer()">00:00</span>
    </div>
    <div class="bottom-goal" id="bottomGoal">🎯 Objectif : RDV physique</div>
  </div>

  <div class="panel phases-col">
    <div class="panel-label">Déroulé de l'appel</div>
    <div id="phaseList"></div>
  </div>

  <div class="main-col">
    <div class="script-display" id="scriptDisplay"></div>
    <div class="quick-qs">
      <div class="panel-label">Questions clés à poser</div>
      <div class="q-grid" id="qGrid"></div>
    </div>
  </div>

  <div class="right-col">
    <div class="panel">
      <div class="panel-label" id="infoLabel">✅ Infos à collecter</div>
      <div class="info-list" id="infoList"></div>
    </div>
    <div class="panel">
      <div class="panel-label">⚡ Objections fréquentes</div>
      <div class="obj-list" id="objList"></div>
    </div>
  </div>

  <div class="bottombar">
    <span class="bottom-label">Progression</span>
    <div class="progress-track"><div class="progress-fill" id="pFill" style="width:20%"></div></div>
    <span class="bottom-label" id="pLabel">Phase 1 / 5</span>
  </div>

</div>

          tip: "Ne suppose jamais qu'il veut changer. Tu ouvres juste une porte, sans pression."

      questions: [

      speeches: [

      ],

        "Vous êtes satisfait du loyer actuel ?",

    },
    {
      title: "Qualification du bien & zone",
      goal: "Vérifier la faisabilité réelle (zone, règlement, fiscalité) avant de vendre du rêve",

    { q: "« J'ai peur de la vacance entre les locations »", r: "« C'est une crainte légitime et fréquente. On vous montre les taux d'occupation réels qu'on obtient sur des biens similaires — souvent la peur est plus grande que la réalité. »" },
    { q: "« Je n'ai pas le budget pour meubler »", r: "« On peut en parler lors du RDV — il y a des solutions progressives, et le retour sur investissement du mobilier est souvent rapide en LCD. »" }

};

let activeMode = mode1;
let current = 0;
let timerInterval = null;
let timerRunning = false;
let seconds = 0;

function setMode(n) {
  activeMode = n === 1 ? mode1 : mode2;
  current = 0;
  document.getElementById('btnMode1').classList.toggle('active', n === 1);
  document.getElementById('btnMode2').classList.toggle('active', n === 2);
  document.documentElement.style.setProperty('--accent-color', activeMode.accent);
  document.documentElement.style.setProperty('--accent-dim', activeMode.accentDim);
  document.getElementById('topTitle').textContent = activeMode.topTitle;
  document.getElementById('bottomGoal').textContent = activeMode.bottomGoal;
  document.getElementById('infoLabel').textContent = activeMode.infoLabel;
  renderPhaseList();
  renderInfo();
  renderObjections();
  render();
}

function renderPhaseList() {
  const pl = document.getElementById('phaseList');
  pl.innerHTML = activeMode.phases.map((p, i) => `
    ${i > 0 ? '<div class="phase-connector"></div>' : ''}
    <div class="phase-item" onclick="goTo(${i})">
      <div class="phase-num">${i + 1}</div>
      <div>
        <div class="phase-title">${p.title.split('—')[0].trim()}</div>
        <div class="phase-sub">${p.title.includes('—') ? p.title.split('—')[1].trim() : ''}</div>
      </div>
    </div>
  `).join('');
}

function renderInfo() {
  const il = document.getElementById('infoList');
  il.innerHTML = activeMode.info.map(t => `
    <div class="info-item" onclick="toggleInfo(this)"><div class="info-box"></div><div class="info-text">${t}</div></div>
  `).join('');
}

function renderObjections() {
  const ol = document.getElementById('objList');
  ol.innerHTML = activeMode.objections.map(o => `
    <div class="obj-item" onclick="toggleObj(this)">
      ${o.q}
      <div class="obj-response">${o.r}</div>
    </div>
  `).join('');
}

function render() {
  const p = activeMode.phases[current];
  const sd = document.getElementById('scriptDisplay');
  sd.innerHTML = `
    <div class="script-phase-title">${p.title}</div>
    <div class="script-phase-goal">🎯 ${p.goal}</div>
    ${p.speeches.map(s => `
      <div class="speech-bubble">
        ${s.text}
        <div class="speech-tip">${s.tip}</div>
      </div>
    `).join('')}
    <div class="nav-buttons">
      <button class="btn btn-prev" onclick="prev()" ${current === 0 ? 'disabled style="opacity:0.3"' : ''}>← Retour</button>
      <button class="btn btn-next" onclick="next()">${current === activeMode.phases.length - 1 ? '✅ Appel terminé' : 'Phase suivante →'}</button>
    </div>
  `;

  const qg = document.getElementById('qGrid');
  qg.innerHTML = p.questions.map(q => `<div class="q-chip" onclick="this.classList.toggle('used')">${q}</div>`).join('');

  document.querySelectorAll('.phase-item').forEach((el, i) => {
    el.classList.remove('active', 'done');
    if (i < current) el.classList.add('done');
    if (i === current) el.classList.add('active');
  });

  const pct = ((current + 1) / activeMode.phases.length) * 100;
  document.getElementById('pFill').style.width = pct + '%';
  document.getElementById('pLabel').textContent = `Phase ${current + 1} / ${activeMode.phases.length}`;
}

function goTo(i) { current = i; render(); }
function next() { if (current < activeMode.phases.length - 1) { current++; render(); } }
function prev() { if (current > 0) { current--; render(); } }
function toggleInfo(el) { el.classList.toggle('checked'); }
function toggleObj(el) {
  document.querySelectorAll('.obj-item').forEach(o => { if (o !== el) o.classList.remove('open'); });
  el.classList.toggle('open');
}

function toggleTimer() {
  if (!timerRunning) {
    timerRunning = true;
    timerInterval = setInterval(() => {
      seconds++;
      const m = String(Math.floor(seconds / 60)).padStart(2, '0');
      const s = String(seconds % 60).padStart(2, '0');
      document.getElementById('timer').textContent = `${m}:${s}`;
      if (seconds > 480) document.getElementById('timer').style.color = 'var(--red)';
    }, 1000);
  } else {
    clearInterval(timerInterval);
    timerRunning = false;
    seconds = 0;
    document.getElementById('timer').textContent = '00:00';
    document.getElementById('timer').style.color = 'var(--green)';
  }
}

// Init
document.documentElement.style.setProperty('--accent-color', mode1.accent);
document.documentElement.style.setProperty('--accent-dim', mode1.accentDim);
renderPhaseList();
renderInfo();
renderObjections();
render();
</script>
